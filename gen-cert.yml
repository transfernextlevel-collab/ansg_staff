name: Generate Self-Signed Certificate

on:
  workflow_dispatch:
    inputs:

      # ┌─────────────────────────────────────────────────────┐
      # │  MODIFIER ICI POUR CHAQUE NOUVEAU PROJET            │
      # └─────────────────────────────────────────────────────┘

      subject:
        description: '🏷️  Publisher ID  —  ex: CN=Mon Application'
        required: true
        default: 'CN=Next Level Premium Hotels'   # ← CHANGER ICI

      friendly_name:
        description: '📛  Nom convivial du certificat'
        required: true
        default: 'NLPH Staff'                 # ← CHANGER ICI

      pfx_password:
        description: '🔑  Mot de passe du fichier .pfx'
        required: true
        default: 'nlph1234'                       # ← CHANGER ICI

      artifact_name:
        description: '📦  Nom de l artefact GitHub (dossier de téléchargement)'
        required: true
        default: 'signing-cert-nlph'              # ← CHANGER ICI

      # └─────────────────────────────────────────────────────┘

jobs:
  gen-cert:
    runs-on: windows-latest
    steps:

      - name: Générer le certificat auto-signé
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "${{ github.event.inputs.subject }}" `
            -KeyUsage DigitalSignature `
            -FriendlyName "${{ github.event.inputs.friendly_name }}" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")

          Write-Host ""
          Write-Host "✅ Certificat généré avec succès !"
          Write-Host "─────────────────────────────────"
          Write-Host "Publisher ID  : $($cert.Subject)"
          Write-Host "Thumbprint    : $($cert.Thumbprint)"
          Write-Host "Expiration    : $($cert.NotAfter)"
          Write-Host "─────────────────────────────────"

          $pwd = ConvertTo-SecureString -String "${{ github.event.inputs.pfx_password }}" -Force -AsPlainText
          Export-PfxCertificate -cert $cert -FilePath cert.pfx -Password $pwd

          Write-Host "📦 Fichier cert.pfx exporté."

      - name: Upload du certificat
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name }}
          path: cert.pfx
          retention-days: 30
